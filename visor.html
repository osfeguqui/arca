<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: rgba(10, 15, 26, 0.8);
            --border: rgba(0, 229, 255, 0.3);
        }
        body { margin: 0; background: #050b14; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Contenedor del Modelo */
        model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }

        /* Panel de Control Estilo Profesional (HUD) */
        #hud {
            position: absolute; top: 20px; left: 20px;
            background: var(--bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            color: white;
            width: 200px;
            z-index: 100;
        }
        h2 { font-size: 14px; margin: 0 0 10px 0; color: var(--primary); letter-spacing: 1px; }
        .layer-item { font-size: 12px; margin-bottom: 8px; display: flex; align-items: center; opacity: 0.8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-right: 10px; box-shadow: 0 0 5px var(--primary); }
        
        /* Animación de carga */
        #progress-bar { position: absolute; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); }
        #update-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="hud">
        <h2>TELEMETRÍA 3D</h2>
        <div class="layer-item"><div class="status-dot"></div> Estructura: <span id="layer-name">Cargando...</span></div>
        <div class="layer-item"><div class="status-dot"></div> Escala: 1:1 (Codos)</div>
        <hr style="border: 0.5px solid var(--border); margin: 10px 0;">
        <div style="font-size: 10px; color: #8c9bba;">MODO INTERACTIVO ACTIVO</div>
    </div>

    <div id="progress-bar"><div id="update-bar"></div></div>

    <model-viewer 
        id="arcaModel"
        src="https://cdn.jsdelivr.net/gh/osfeguqui/arca@4f9a3b1ce290b94c3ee55e9afbae4b7caebd456d/ark.glb" 
        camera-controls 
        auto-rotate 
        environment-image="neutral" 
        exposure="1.2"
        shadow-intensity="1">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector("#arcaModel");
        const progress = document.querySelector("#update-bar");

        // Escuchar la carga
        modelViewer.addEventListener('progress', (ev) => {
            progress.style.width = `${ev.detail.totalProgress * 100}%`;
            if(ev.detail.totalProgress === 1) progress.style.display = 'none';
        });

        // LÓGICA DE INTERACTIVIDAD CON POWER BI
        // Leemos los parámetros de la URL: ?capa=Piso1
        const params = new URLSearchParams(window.location.search);
        const capaActiva = params.get('capa') || 'Modelo Completo';
        document.getElementById('layer-name').innerText = capaActiva;

        // Si el modelo tiene variantes o nombres de nodos, podrías ocultarlos aquí
        // Por ahora, cambiaremos la vista de cámara según el piso seleccionado
        modelViewer.addEventListener('load', () => {
            if(capaActiva.includes("Piso 1")) {
                modelViewer.cameraTarget = "0m 5m 0m"; 
                modelViewer.fieldOfView = "30deg";
            }
        });
    </script>
</body>
</html>
